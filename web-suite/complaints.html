<!DOCTYPE html>
<html>
<head>
    <title>CitizenConnect - My Complaints</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gov-saffron: #FF9933;
            --gov-white: #FFFFFF;
            --gov-green: #138808;
            --gov-navy: #003087;
            --gov-navy-dark: #1a1a6e;
            --gov-navy-light: #0044b0;
            --gov-blue-bar: #003380;
            --gov-gray-bg: #f0f4f8;
            --gov-gray-light: #e8edf2;
            --gov-text: #1a1a1a;
            --gov-text-light: #4b4b4b;
            --gov-border: #cccccc;
            --gov-footer: #1B2A6B;
            --gov-footer-dark: #111d4e;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Noto Sans', sans-serif; background: #fff; color: var(--gov-text); line-height: 1.6; }
        a { color: var(--gov-navy); text-decoration: none; }
        a:hover { text-decoration: underline; color: var(--gov-navy-light); }
        img { max-width: 100%; }

        /* Header Styles */
        .tricolor-strip {
            height: 5px;
            background: linear-gradient(90deg,
                #FF9933 0%, #FF9933 33.33%,
                #fff 33.33%, #fff 66.66%,
                #138808 66.66%, #138808 100%);
        }

        .utility-bar {
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            padding: 4px 0;
            font-size: 0.78rem;
        }
        .utility-bar .inner {
            max-width: 1200px; margin: 0 auto; padding: 0 1rem;
            display: flex; justify-content: space-between; align-items: center; gap: 1rem;
        }
        .utility-bar a { color: var(--gov-navy); margin-right: 10px; }
        .utility-bar a:hover { text-decoration: underline; }

        .site-header {
            background: #fff;
            border-bottom: 3px solid var(--gov-saffron);
            padding: 14px 0;
        }
        .site-header .inner {
            max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
            display: flex; align-items: center; gap: 1.5rem;
        }
        .portal-title { flex: 1; }
        .portal-title .ministry {
            font-size: 0.78rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px;
        }
        .portal-title h1 {
            font-size: 1.45rem; font-weight: 700; color: var(--gov-navy); line-height: 1.2;
        }
        .portal-title .tagline {
            font-size: 0.82rem; color: var(--gov-text-light); margin-top: 2px;
        }

        .main-nav {
            background: var(--gov-blue-bar);
            position: sticky; top: 0; z-index: 1000;
        }
        .main-nav .inner {
            max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
            display: flex; align-items: stretch;
        }
        .main-nav a {
            display: block; color: #fff; padding: 12px 16px;
            font-size: 0.9rem; font-weight: 500; white-space: nowrap;
            text-decoration: none; border-right: 1px solid rgba(255,255,255,0.15);
            transition: background 0.2s;
        }
        .main-nav a:first-child { border-left: 1px solid rgba(255,255,255,0.15); }
        .main-nav a:hover, .main-nav a.active { background: var(--gov-saffron); color: #fff; }
        .nav-spacer { flex: 1; }
        .nav-action-btns { display: flex; align-items: center; gap: 8px; padding: 8px 0; }

        .complaints-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 1.5rem;
        }

        .complaints-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .complaints-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gov-navy);
            margin-bottom: 8px;
        }

        .btn-primary {
            padding: 10px 20px;
            background: var(--gov-saffron);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary:hover {
            background: #e68a2e;
        }

        .complaints-table {
            width: 100%;
            background: #fff;
            border: 1px solid var(--gov-border);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }

        .complaints-table th {
            background: var(--gov-navy);
            color: #fff;
            text-align: left;
            padding: 16px;
            font-weight: 600;
        }

        .complaints-table td {
            padding: 16px;
            border-bottom: 1px solid var(--gov-border);
        }

        .complaints-table tr:last-child td {
            border-bottom: none;
        }

        .complaints-table tr:hover td {
            background: var(--gov-gray-bg);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3e0;
            color: #f57c00;
        }

        .status-progress {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-resolved {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status-closed {
            background: #f5f5f5;
            color: #757575;
        }

        .priority-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-high {
            background: #ffebee;
            color: #c62828;
        }

        .priority-medium {
            background: #fff8e1;
            color: #f57f17;
        }

        .priority-low {
            background: #e8f5e9;
            color: #388e3c;
        }

        .footer {
            background: var(--gov-footer);
            color: #cdd5e0;
            padding: 20px 0;
            margin-top: 40px;
        }

        .footer .inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            text-align: center;
        }

        .footer a {
            color: #9be;
        }

        @media (max-width: 768px) {
            .complaints-container {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="tricolor-strip"></div>

    <div class="utility-bar">
        <div class="inner">
            <div>
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
            </div>
            <div class="utility-right">
                <span>Welcome, <span id="userName">Citizen</span></span> |
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </div>

    <header class="site-header">
        <div class="inner">
            <div class="portal-title">
                <h1>CitizenConnect - My Complaints</h1>
                <div class="tagline">Citizen Grievance & Complaint Management System</div>
            </div>
        </div>
    </header>

    <nav class="main-nav">
        <div class="inner">
            <a href="dashboard.html">Dashboard</a>
            <a href="complaints.html" class="active">My Complaints</a>
            <a href="track.html">Track Complaint</a>
            <div class="nav-spacer"></div>
            <div class="nav-action-btns">
                <button class="btn-primary" onclick="location.href='new-complaint.html'">File New Complaint</button>
            </div>
        </div>
    </nav>

    <div class="complaints-container">
        <div class="complaints-header">
            <div class="complaints-title">
                <h1>My Complaints</h1>
                <p>View and manage all your filed complaints</p>
            </div>
            <div class="complaints-actions">
                <button class="btn-primary" onclick="location.href='new-complaint.html'">File New Complaint</button>
            </div>
        </div>

        <div class="complaints-table">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th>Complaint ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Priority</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px;">
                            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                                <div style="width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid var(--gov-navy); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                                Loading complaints...
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('token');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
